version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: dobby-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: dobby-ads
    networks:
      - dobby-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dobby-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/dobby-ads
      JWT_SECRET: ${JWT_SECRET:-changeme_in_production_please}
      JWT_EXPIRE: 7d
      NODE_ENV: production
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      - mongo
    networks:
      - dobby-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:5000/api}
    container_name: dobby-frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - dobby-net

volumes:
  mongo-data:
  uploads-data:

networks:
  dobby-net:
    driver: bridge
